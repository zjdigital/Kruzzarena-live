<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KRUZZARENA Admin Login</title>
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <main class="login-wrap">
      <section class="login-card">
        <div class="logo-row" aria-hidden="true">
          <div class="logo-chip">UBC</div>
          <div class="logo-chip">KRUZZ</div>
          <div class="logo-chip">UNCHALL</div>
          <div class="logo-chip">DSS</div>
        </div>
        <h1 class="login-title">KRUZZ<span>ARENA</span><br />ADMIN</h1>
        <p class="login-subtitle">Live Match Control Panel</p>

        <form id="loginForm" class="form-stack">
          <label class="field">
            <span>Password Admin</span>
            <input id="password" type="password" autocomplete="current-password" autofocus />
          </label>
          <button class="button" type="submit">Masuk</button>
          <a class="button secondary" href="viewer.html">Lihat Viewer</a>
        </form>
        <p id="loginError" class="error" role="alert"></p>
      </section>
    </main>

    <script src="config.js"></script>
    <script>
      const form = document.querySelector("#loginForm");
      const password = document.querySelector("#password");
      const loginError = document.querySelector("#loginError");

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        if (password.value === window.KRUZZARENA_CONFIG.adminPassword) {
          sessionStorage.setItem("kruzzarena-admin", "true");
          window.location.href = "admin.html";
          return;
        }
        loginError.textContent = "Password salah. Coba lagi.";
      });
    </script>
  </body>
</html>
